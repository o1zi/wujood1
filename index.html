<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>وجود — منصة بناء مواقع المكاتب المهنية</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* App shell */
    #app { min-height: 100vh; }

    /* Top route switcher (dev/preview only) */
    .wj-nav-switcher {
      position: fixed;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: inline-flex; gap: 2px;
      background: rgba(20, 32, 26, 0.92);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      padding: 4px;
      box-shadow: var(--sh-lg);
      max-width: calc(100vw - 32px);
      overflow-x: auto;
    }
    .wj-nav-switcher::-webkit-scrollbar { display: none; }
    .wj-nav-switcher button {
      color: rgba(255,255,255,.7);
      font-size: 12.5px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 999px;
      white-space: nowrap;
      transition: all .15s;
    }
    .wj-nav-switcher button:hover { color: #fff; }
    .wj-nav-switcher button.active {
      background: var(--accent);
      color: #fff;
    }
    .wj-nav-switcher .sep {
      width: 1px; background: rgba(255,255,255,.12);
      margin: 6px 4px;
      flex-shrink: 0;
    }
    .wj-nav-label {
      color: rgba(255,255,255,.4); font-size: 11px;
      padding: 7px 8px 7px 4px; align-self: center;
      font-family: var(--font-mono);
      letter-spacing: .03em;
    }
  </style>

  <!-- React 18 (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>

  <!-- Shared atoms, icons, mock data -->
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/atoms.jsx"></script>

  <!-- Templates -->
  <script type="text/babel" src="src/views/templates/classic.jsx"></script>
  <script type="text/babel" src="src/views/templates/heritage.jsx"></script>
  <script type="text/babel" src="src/views/templates/minimal.jsx"></script>
  <script type="text/babel" src="src/views/templates/luxury.jsx"></script>
  <script type="text/babel" src="src/views/templates/studio.jsx"></script>

  <!-- Views -->
  <script type="text/babel" src="src/views/landing.jsx"></script>
  <script type="text/babel" src="src/views/auth.jsx"></script>
  <script type="text/babel" src="src/views/tenant.jsx"></script>
  <script type="text/babel" src="src/views/admin.jsx"></script>
  <script type="text/babel" src="src/views/publicSite.jsx"></script>
  <script type="text/babel" src="src/views/themeBuilder.jsx"></script>

  <!-- Main app/router -->
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
